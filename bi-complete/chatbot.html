<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>B&amp;I Controls AI</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;500;600;700&family=Source+Code+Pro:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--navy:#003087;--blue:#0057B8;--bg:#F4F5F7;--white:#fff;--border:#D8DCE6;--border-lt:#EAEDF3;--text:#1A1F36;--text-3:#8C94A4;--blue-lt:#E8EFF9;--blue-mid:#C7D9F3;--fail:#FDECEA;--fail-c:#C62828;--warn:#FFF8E1;--warn-c:#E65100;--pass:#E8F5E9;--pass-c:#2E7D32;--neu:#F1F3F7;--neu-c:#5A6070;--font:'Source Sans 3',sans-serif;--mono:'Source Code Pro',monospace}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--white);color:var(--text);display:flex;flex-direction:column;font-size:14px}
.hdr{background:var(--navy);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-l{display:flex;align-items:center;gap:9px}
.hdr-ico{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,.15);display:grid;place-items:center;font-size:14px}
.hdr-title{font-size:13px;font-weight:700;color:#fff}
.hdr-scope{font-size:10px;color:rgba(255,255,255,.5);margin-top:1px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-badge{font-size:9px;font-weight:700;background:rgba(255,255,255,.15);color:rgba(255,255,255,.75);padding:2px 8px;border-radius:10px;letter-spacing:.5px}
.chart-bar{background:#F0F3FA;border-bottom:1px solid var(--border-lt);padding:6px 12px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;flex-shrink:0}
.cb-label{font-size:10px;font-weight:600;color:var(--text-3);margin-right:3px}
.ct{font-size:10px;font-weight:600;padding:3px 9px;border-radius:12px;cursor:pointer;border:1px solid var(--border);background:var(--white);color:var(--text-3);font-family:var(--font);transition:all .15s}
.ct:hover{border-color:var(--blue);color:var(--blue)}
.ct.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.session-bar{padding:5px 12px;background:#F7F9FD;border-bottom:1px solid var(--border-lt);display:flex;align-items:center;justify-content:space-between;font-size:11px;color:var(--text-3);flex-shrink:0}
.session-id{font-family:var(--mono);font-size:10px}
.new-btn{font-size:11px;color:var(--blue);background:none;border:none;cursor:pointer;font-family:var(--font);font-weight:600}
.new-btn:hover{text-decoration:underline}
.msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px;background:var(--bg)}
.msgs::-webkit-scrollbar{width:3px}
.msgs::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.mwrap{display:flex;flex-direction:column;max-width:95%}
.mwrap.user{align-self:flex-end;align-items:flex-end}
.mwrap.ai{align-self:flex-start;align-items:flex-start}
.sender{font-size:9px;color:var(--text-3);margin-bottom:3px;font-family:var(--mono)}
.cmsg{font-size:12px;line-height:1.65;padding:9px 12px;border-radius:8px;word-break:break-word}
.cmsg.user{background:var(--navy);color:#fff;border-bottom-right-radius:3px}
.cmsg.ai{background:var(--white);color:var(--text);border:1px solid var(--border);border-bottom-left-radius:3px}
.cmsg.typing{background:var(--white);border:1px solid var(--border);color:var(--text-3);font-style:italic}
.cmsg.error{background:var(--fail);color:var(--fail-c);border:1px solid #FFCDD2;font-size:11px}
/* Chart card */
.chart-card{background:var(--white);border:1px solid var(--border);border-radius:8px;overflow:hidden;border-bottom-left-radius:3px;box-shadow:0 2px 8px rgba(0,0,0,.06);width:100%;animation:fu .3s ease}
@keyframes fu{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.cc-hdr{background:#F7F9FD;border-bottom:1px solid var(--border-lt);padding:9px 12px;display:flex;align-items:flex-start;justify-content:space-between}
.cc-title{font-size:12px;font-weight:700}
.cc-sub{font-size:10px;color:var(--text-3);margin-top:1px}
.cc-acts{display:flex;gap:5px;flex-shrink:0;margin-left:8px}
.cc-btn{font-size:9px;font-weight:600;color:var(--blue);background:var(--blue-lt);border:1px solid var(--blue-mid);padding:2px 7px;border-radius:8px;cursor:pointer;font-family:var(--font);transition:background .15s}
.cc-btn:hover{background:#D0E4FF}
.cc-body{padding:12px}
.cc-body canvas{max-height:190px}
.cc-footer{padding:7px 12px;background:#FAFBFD;border-top:1px solid var(--border-lt);font-size:10px;color:var(--text-3);display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.leg{width:7px;height:7px;border-radius:50%;flex-shrink:0}
/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px}
.kpi-box{border:1px solid var(--border);border-radius:5px;padding:10px;text-align:center;border-top:3px solid var(--fail-c)}
.kpi-box.amber{border-top-color:var(--warn-c)}.kpi-box.green{border-top-color:var(--pass-c)}.kpi-box.blue{border-top-color:var(--blue)}.kpi-box.na{border-top-color:#CBD5E0}
.kpi-lbl{font-size:9px;font-weight:700;color:var(--text-3);text-transform:uppercase;letter-spacing:.7px}
.kpi-val{font-size:20px;font-weight:700;margin:3px 0}
.kpi-sub{font-size:10px;color:var(--text-3)}
.kpi-trend{display:inline-flex;align-items:center;gap:2px;font-size:10px;font-weight:700;padding:1px 6px;border-radius:8px;margin-top:4px}
.trend-up{background:var(--fail);color:var(--fail-c)}.trend-down{background:var(--pass);color:var(--pass-c)}.trend-flat{background:var(--neu);color:var(--neu-c)}
/* Table */
.dtable{width:100%;border-collapse:collapse;font-size:11px}
.dtable th{background:#F7F9FD;padding:6px 10px;text-align:left;font-weight:700;color:var(--text-3);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border)}
.dtable td{padding:6px 10px;border-bottom:1px solid var(--border-lt)}
.dtable tr:last-child td{border-bottom:none}
.dtable tr:hover td{background:#F7F9FD}
.sdot{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:700}
.sdot::before{content:'';width:6px;height:6px;border-radius:50%}
.s-red::before{background:var(--fail-c)}.s-red{color:var(--fail-c)}
.s-amber::before{background:var(--warn-c)}.s-amber{color:var(--warn-c)}
.s-green::before{background:var(--pass-c)}.s-green{color:var(--pass-c)}
/* Typing */
.tdots{display:flex;align-items:center;gap:3px;padding:10px 12px}
.tdots span{width:6px;height:6px;border-radius:50%;background:var(--text-3);animation:td .8s infinite}
.tdots span:nth-child(2){animation-delay:.2s}.tdots span:nth-child(3){animation-delay:.4s}
@keyframes td{0%,80%,100%{transform:scale(.8);opacity:.5}40%{transform:scale(1.2);opacity:1}}
/* Chips */
.chips{padding:6px 12px 8px;display:flex;flex-wrap:wrap;gap:5px;background:var(--bg);border-top:1px solid var(--border-lt);flex-shrink:0}
.chip{font-size:10px;color:var(--blue);background:var(--blue-lt);border:1px solid var(--blue-mid);padding:3px 9px;border-radius:12px;cursor:pointer;font-family:var(--font);transition:background .15s;white-space:nowrap}
.chip:hover{background:#D0E4FF}
/* Input */
.inp-row{padding:10px 12px;border-top:1px solid var(--border-lt);display:flex;gap:7px;align-items:flex-end;background:var(--white);flex-shrink:0}
.inp{flex:1;border:1px solid var(--border);border-radius:5px;padding:7px 10px;font-size:12px;font-family:var(--font);resize:none;line-height:1.5;max-height:70px;color:var(--text);outline:none;transition:border-color .15s}
.inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,87,184,.1)}
.inp::placeholder{color:var(--text-3)}
.send{width:32px;height:32px;border-radius:5px;background:var(--navy);border:none;cursor:pointer;color:#fff;display:grid;place-items:center;flex-shrink:0;transition:background .15s}
.send:hover{background:var(--blue)}.send:disabled{background:var(--border);cursor:not-allowed}
.foot{padding:5px 12px;font-size:10px;color:var(--text-3);text-align:center;border-top:1px solid var(--border-lt);background:var(--white);flex-shrink:0}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-l">
    <div class="hdr-ico">🤖</div>
    <div><div class="hdr-title">B&amp;I Controls AI</div><div class="hdr-scope" id="scope">Loading…</div></div>
  </div>
  <span class="hdr-badge">SCOPED</span>
</div>

<div class="chart-bar">
  <span class="cb-label">View:</span>
  <button class="ct active" onclick="setPref(this,'auto')">🤖 Auto</button>
  <button class="ct" onclick="setPref(this,'bar')">📊 Bar</button>
  <button class="ct" onclick="setPref(this,'line')">📈 Trend</button>
  <button class="ct" onclick="setPref(this,'pie')">🥧 Pie</button>
  <button class="ct" onclick="setPref(this,'kpi')">🔢 KPI</button>
  <button class="ct" onclick="setPref(this,'table')">📋 Table</button>
  <button class="ct" onclick="setPref(this,'text')">💬 Text</button>
</div>

<div class="session-bar">
  <span class="session-id" id="sid-display">No session</span>
  <button class="new-btn" onclick="newSession()">+ New Session</button>
</div>

<div class="msgs" id="msgs"></div>
<div class="chips" id="chips" style="display:none"></div>
<div class="inp-row">
  <textarea class="inp" id="inp" placeholder="Ask about this scorecard — AI will choose the best chart…" rows="1"></textarea>
  <button class="send" id="send">
    <svg width="14" height="14" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
  </button>
</div>
<div class="foot">Vertex AI Gemini · Smart charts · History saved to Oracle DB · Citi Confidential</div>

<script>
const API    = "http://localhost:8000";
const params = new URLSearchParams(window.location.search);
const scId   = params.get("id")   || "unknown";
const scName = params.get("name") || "Scorecard";
const userId = params.get("user") || "ANONYMOUS";
const viewId = params.get("view") || "";
let chips=[]; try{chips=JSON.parse(decodeURIComponent(params.get("chips")||"[]"));}catch(e){}

document.getElementById("scope").textContent = scName;
document.title = `AI — ${scName}`;

let history=[], sessionId=null, chartPref="auto", chartIdx=0;

// Render chips
const chipsEl=document.getElementById("chips");
if(chips.length){
  chipsEl.innerHTML=chips.map(c=>`<button class="chip">${c}</button>`).join("");
  chipsEl.style.display="flex";
  chipsEl.querySelectorAll(".chip").forEach(c=>c.addEventListener("click",()=>{
    document.getElementById("inp").value=c.textContent;
    chipsEl.style.display="none"; send();
  }));
}

addMsg("ai",`I am scoped to <strong>${scName}</strong>. Ask me anything — I will respond with the most relevant chart or visualisation.`);

// Chart preference
function setPref(btn,t){document.querySelectorAll(".ct").forEach(b=>b.classList.remove("active"));btn.classList.add("active");chartPref=t;}

// Session
function newSession(){sessionId=null;history=[];document.getElementById("msgs").innerHTML="";document.getElementById("sid-display").textContent="New session";addMsg("ai",`New session. Ask me about <strong>${scName}</strong>.`);}

// Handlers
document.getElementById("send").addEventListener("click",send);
document.getElementById("inp").addEventListener("keydown",e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send();}});
document.getElementById("inp").addEventListener("input",function(){this.style.height="auto";this.style.height=Math.min(this.scrollHeight,70)+"px";});

async function send(){
  const inp=document.getElementById("inp"),btn=document.getElementById("send");
  const text=inp.value.trim(); if(!text) return;
  addMsg("user",text); history.push({role:"user",content:text});
  inp.value=""; inp.style.height="auto"; btn.disabled=true;
  chipsEl.style.display="none";
  const tid=showTyping();
  try{
    const headers={"Content-Type":"application/json","X-User-ID":userId};
    if(viewId) headers["X-View-ID"]=viewId;
    const res=await fetch(`${API}/chat/`,{
      method:"POST",headers,
      body:JSON.stringify({
        scorecard_id:scId, scorecard_name:scName,
        messages:history, session_id:sessionId||undefined,
        user_id:userId, view_id:viewId||"", max_tokens:800
      })
    });
    removeTyping(tid);
    if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.detail||`HTTP ${res.status}`);}
    const data=await res.json();
    if(data.session_id){sessionId=data.session_id;document.getElementById("sid-display").textContent=data.session_id.substring(0,8)+"…";}
    history.push({role:"assistant",content:data.reply});
    renderResponse(data.reply, data.chart);
  }catch(e){
    removeTyping(tid);
    addMsg("error",e.message.includes("fetch")
      ?"⚠️ Backend offline. Run: <code>uvicorn main:app --port 8000</code>"
      :`⚠️ ${e.message}`);
  }
  btn.disabled=false; document.getElementById("inp").focus();
}

/* ─── Render response + chart ─── */
function renderResponse(reply, chart){
  addMsg("ai", reply);
  if(!chart) return;
  const type=chartPref!=="auto"
    ? (["kpi","table"].includes(chart.chart_type)?chart.chart_type:chartPref)
    : chart.chart_type;
  if(type==="text"||!type) return;
  if(type==="kpi"&&chart.kpis)              renderKPI(chart);
  else if(type==="table"&&chart.table_rows) renderTable(chart);
  else if(type==="pie"&&chart.labels)       renderPie(chart,"pie");
  else if(type==="doughnut"&&chart.labels)  renderPie(chart,"doughnut");
  else if(type==="line"&&chart.labels)      renderLine(chart);
  else if(type==="bar"&&chart.labels)       renderBar(chart);
  else if(chart.kpis)                       renderKPI(chart);
  else if(chart.table_rows)                 renderTable(chart);
  else if(chart.labels&&chart.datasets)     renderBar(chart);
}

function mkCard(chart, bodyHTML){
  const d=document.createElement("div"); d.className="chart-card";
  d.innerHTML=`<div class="cc-hdr"><div><div class="cc-title">${chart.title||""}</div><div class="cc-sub">${chart.subtitle||""}</div></div><div class="cc-acts"><button class="cc-btn" onclick="dlChart(this)">⬇ PNG</button><button class="cc-btn" onclick="expandCard(this)">⛶</button></div></div>${bodyHTML}<div class="cc-footer"><span style="font-family:var(--mono);font-size:10px">B&I Controls AI · ${scName} · ${new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}</span></div>`;
  return d;
}
function appendCard(card){
  const box=document.getElementById("msgs"),w=document.createElement("div");
  w.className="mwrap ai";
  const s=document.createElement("div");s.className="sender";s.textContent="B&I Controls AI";
  w.appendChild(s);w.appendChild(card);box.appendChild(w);box.scrollTop=box.scrollHeight;
}

function renderKPI(chart){
  const id="kpi"+(++chartIdx);
  const card=mkCard(chart,`<div class="kpi-grid" id="${id}"></div>`);
  appendCard(card);
  const g=document.getElementById(id);
  (chart.kpis||[]).forEach(k=>{
    const d=document.createElement("div");
    d.className=`kpi-box ${k.color||"blue"}`;
    d.innerHTML=`<div class="kpi-lbl">${k.label||k.id||""}</div><div class="kpi-val">${k.value||k.val||""}</div><div class="kpi-sub">${k.subtitle||k.sub||""}</div>${k.trend?`<div class="kpi-trend trend-${k.trend_type||k.trendType||"flat"}">${k.trend}</div>`:""}`;
    g.appendChild(d);
  });
}

function renderTable(chart){
  const cols=chart.table_cols||chart.columns||[];
  const rows=chart.table_rows||chart.rows||[];
  const sc={red:"s-red",amber:"s-amber",green:"s-green",yes:"s-red",no:"s-green",pass:"s-green",fail:"s-red"};
  const tbl=`<div style="overflow-x:auto;padding:12px"><table class="dtable"><thead><tr>${cols.map(c=>`<th>${c}</th>`).join("")}</tr></thead><tbody>${rows.map(r=>`<tr>${r.map(cell=>{const cls=sc[String(cell).toLowerCase()];return cls?`<td><span class="sdot ${cls}">${cell}</span></td>`:`<td style="${String(cell).startsWith("▼")?"color:var(--fail-c);font-weight:600":String(cell).startsWith("▲")?"color:var(--pass-c);font-weight:600":""}">${cell}</td>`;}).join("")}</tr>`).join("")}</tbody></table></div>`;
  appendCard(mkCard(chart,tbl));
}

function renderBar(chart){
  const id="c"+(++chartIdx);
  appendCard(mkCard(chart,`<div class="cc-body"><canvas id="${id}"></canvas></div>`));
  new Chart(document.getElementById(id),{type:"bar",
    data:{labels:chart.labels,datasets:(chart.datasets||[]).map(ds=>({label:ds.label||"",data:ds.data,backgroundColor:Array.isArray(ds.color)?ds.color.map(c=>c+"CC"):(ds.color||"#1565C0")+"CC",borderColor:Array.isArray(ds.color)?ds.color:(ds.color||"#1565C0"),borderWidth:2,borderRadius:4}))},
    options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:(chart.datasets||[]).length>1,position:"bottom",labels:{font:{size:10},boxWidth:10}}},scales:{y:{beginAtZero:true,ticks:{font:{size:10}},grid:{color:"rgba(0,0,0,.05)"}},x:{ticks:{font:{size:10}},grid:{display:false}}},animation:{duration:600}}
  });
}

function renderLine(chart){
  const id="c"+(++chartIdx);
  appendCard(mkCard(chart,`<div class="cc-body"><canvas id="${id}"></canvas></div>`));
  new Chart(document.getElementById(id),{type:"line",
    data:{labels:chart.labels,datasets:(chart.datasets||[]).map(ds=>({label:ds.label||"",data:ds.data,borderColor:ds.color||"#1565C0",backgroundColor:(ds.color||"#1565C0")+"18",borderWidth:ds.dashed?2:2.5,borderDash:ds.dashed?[6,4]:[],pointRadius:ds.dashed?0:4,fill:!ds.dashed,tension:0.4}))},
    options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:(chart.datasets||[]).length>1,position:"bottom",labels:{font:{size:10},boxWidth:12}}},scales:{y:{beginAtZero:true,ticks:{font:{size:10}},grid:{color:"rgba(0,0,0,.05)"}},x:{ticks:{font:{size:10}},grid:{display:false}}},animation:{duration:700}}
  });
}

function renderPie(chart,type){
  const id="c"+(++chartIdx);
  const colors=chart.colors||["#1565C0","#C62828","#2E7D32","#E65100","#9E9E9E"];
  const card=mkCard(chart,`<div class="cc-body" style="max-width:240px;margin:0 auto"><canvas id="${id}"></canvas></div>`);
  setTimeout(()=>{const f=card.querySelector(".cc-footer");if(f&&chart.labels){f.innerHTML=(chart.labels||[]).map((l,i)=>`<span class="leg" style="background:${colors[i]||'#999'}"></span>${l}: ${(chart.data||[])[i]||0}`).join("&nbsp;&nbsp;");}},50);
  appendCard(card);
  new Chart(document.getElementById(id),{type,data:{labels:chart.labels,datasets:[{data:chart.data||[],backgroundColor:colors.map(c=>c+"DD"),borderColor:colors,borderWidth:2,hoverOffset:8}]},options:{responsive:true,maintainAspectRatio:true,plugins:{legend:{display:false}},animation:{duration:600}}});
}

function dlChart(btn){
  const c=btn.closest(".chart-card").querySelector("canvas");
  if(!c) return;
  const a=document.createElement("a");a.href=c.toDataURL("image/png");a.download=`bi-chart-${Date.now()}.png`;a.click();
}
function expandCard(btn){const card=btn.closest(".chart-card");const ex=card.style.width==="100%";card.style.width=ex?"":"100%";card.style.maxWidth=ex?"":"100%";}

/* ─── Message helpers ─── */
function addMsg(type,html,id){
  const box=document.getElementById("msgs"),w=document.createElement("div");
  w.className="mwrap "+type;
  const s=document.createElement("div");s.className="sender";s.textContent=type==="user"?"You":"B&I Controls AI";w.appendChild(s);
  const d=document.createElement("div");d.className="cmsg "+type;d.innerHTML=html;if(id)d.id=id;
  w.appendChild(d);box.appendChild(w);box.scrollTop=box.scrollHeight;
}
function showTyping(){
  const box=document.getElementById("msgs"),w=document.createElement("div");
  const tid="typ"+Date.now();w.id=tid;w.className="mwrap ai";
  const s=document.createElement("div");s.className="sender";s.textContent="B&I Controls AI";w.appendChild(s);
  const d=document.createElement("div");d.className="cmsg typing";d.innerHTML='<div class="tdots"><span></span><span></span><span></span></div>';
  w.appendChild(d);box.appendChild(w);box.scrollTop=box.scrollHeight;
  return tid;
}
function removeTyping(tid){document.getElementById(tid)?.remove();}

document.getElementById("inp").focus();
</script>
</body>
</html>
