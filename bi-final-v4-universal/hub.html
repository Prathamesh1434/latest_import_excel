.spin{animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.count-up{animation:cu .5s ease}
@keyframes cu{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}

function App(){
  const [theme,setTheme] = useState("dark");
  const [tab,setTab]     = useState("hub");
  const [variant,setVariant] = useState(0);
  const [search,setSearch]   = useState("");
  const [ragFilter,setRagFilter] = useState("all");
  const [collapsed,setCollapsed] = useState({});
  const [drillCard,setDrillCard] = useState(null);
  const [chatOpen,setChatOpen]   = useState(false);
  const [chatSC,setChatSC]       = useState(null);
  const [chatMsgs,setChatMsgs]   = useState([]);
  const [chatIn,setChatIn]       = useState("");
  const [chartPref,setChartPref] = useState("auto");
  const [sidebar,setSidebar]     = useState(true);
  const [health,setHealth]       = useState({});
  const [sending,setSending]     = useState(false);

  const T  = THEMES[theme];
  const AC = VARIANTS[variant].accent;
  const SC = VARIANTS[variant].second;

  // Health check on mount
  useEffect(()=>{
    fetch(`${API}/health/`).then(r=>r.json()).then(d=>{
      const h={};
      (d.services||[]).forEach(s=>{ h[s.name.toLowerCase().replace(/\s/,"")]=s.status; });
      setHealth(h);
    }).catch(()=>{});
  },[]);

  const allSC = LEGAL_ENTITIES.flatMap(e=>e.scorecards);
  const filtered = allSC.filter(s=>{
    const q=search.toLowerCase();
    return (!q||s.name.toLowerCase().includes(q)||s.id.includes(q))
        && (ragFilter==="all"||s.rag===ragFilter);
  });
  const redCnt   = allSC.filter(s=>s.rag==="red").length;
  const amberCnt = allSC.filter(s=>s.rag==="amber").length;
  const greenCnt = allSC.filter(s=>s.rag==="green").length;

  function openChat(sc){
    setChatSC(sc); setChatOpen(true);
    setChatMsgs([{role:"ai",text:`I'm scoped to **${sc.name}**. Ask me anything.`,
      chips:["Which KRIs are Red?","Show trend for UK-K41","RAG distribution","Summary"]}]);
  }

  async function sendChat(){
    if(!chatIn.trim()||sending) return;
    const q = chatIn.trim();
    setChatMsgs(m=>[...m,{role:"user",text:q}]);
    setChatIn(""); setSending(true);
    try{
      const res = await fetch(`${API}/query/${chatSC?.id||"uk-kri"}`,{
        method:"POST",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({question:q})
      });
      const d = await res.json();
      setChatMsgs(m=>[...m,{role:"ai",text:d.reply||d.answer||"Done.",chart:d.chart}]);
    }catch(e){
      setChatMsgs(m=>[...m,{role:"ai",text:`Backend offline. Try: uvicorn main:app --port 8000`,error:true}]);
    }
    setSending(false);
  }

  function toggleCollapse(id){ setCollapsed(p=>({...p,[id]:!p[id]})); }

  /* ── Shared button style ── */
  function btn(extra={}){ return {
    display:"inline-flex",alignItems:"center",gap:6,padding:"7px 14px",borderRadius:8,
    border:"none",cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:600,
    transition:"all .15s",...extra
  };}

  /* ── Card styles ── */
  const cardBase = {
    background:T.card, border:`1px solid ${T.border}`,
    borderRadius:12, transition:"all .2s cubic-bezier(.4,0,.2,1)",
    boxShadow: theme==="dark"?"0 4px 24px rgba(0,0,0,.3)":"0 2px 12px rgba(0,0,0,.06)"
  };

  /* ══════════════════════════════════════════════
     RENDER
  ══════════════════════════════════════════════ */
  return (
    <div style={{minHeight:"100vh",background:T.bg,color:T.text,
                 fontFamily:"'DM Sans',system-ui,sans-serif",
                 display:"flex",flexDirection:"column",overflow:"hidden",

      {/* ── TOP BAR ── */}

                      zIndex:100}}>

        <button onClick={()=>setSidebar(p=>!p)}
          style={{background:"none",border:"none",color:T.muted,cursor:"pointer",padding:4}}>
          <Ico d={I.dash} size={18}/>
        </button>

        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:28,height:28,borderRadius:7,background:`linear-gradient(135deg,${AC},${SC})`,
                       display:"grid",placeItems:"center",fontSize:14}}>✦</div>
          <span style={{fontWeight:700,fontSize:14,letterSpacing:"-.3px"}}>B&I Controls Hub</span>
          <span style={{fontSize:9,fontWeight:700,padding:"2px 7px",
                        background:`${AC}20`,color:AC,borderRadius:4,letterSpacing:.5}}>ENTERPRISE</span>
        </div>

        {/* Search */}
        <div style={{flex:1,maxWidth:340,marginLeft:24}}>
          <div style={{display:"flex",alignItems:"center",gap:8,
                       background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,padding:"6px 12px"}}>
            <Ico d={I.search} size={13} color={T.muted}/>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="Search scorecards, entities, KRIs…"
              style={{background:"none",border:"none",outline:"none",color:T.text,fontSize:13,flex:1,fontFamily:"inherit"}}/>
            {search && <button onClick={()=>setSearch("")} style={{background:"none",border:"none",cursor:"pointer",color:T.muted}}>
              <Ico d={I.x} size={12}/>
            </button>}
          </div>
        </div>

        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          {/* Health dots */}
          <div style={{display:"flex",alignItems:"center",gap:4,padding:"4px 8px",
                       background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8}}>
            {[["tableau","T"],["vertexai","AI"],["oracle","DB"]].map(([k,lbl])=>(
              <span key={k} title={`${k}: ${health[k]||"unknown"}`}
                style={{display:"flex",alignItems:"center",gap:3,fontSize:9,color:T.muted}}>
                <span style={{width:7,height:7,borderRadius:"50%",background:
                  health[k]==="ok"?"#10B981":health[k]==="down"?"#F43F5E":"#6B7A99"}}/>
                {lbl}
              </span>
            ))}
          </div>

          {/* Variant picker */}

                       border:`1px solid ${T.border}`,borderRadius:8}}>
            {VARIANTS.map((v,i)=>(

            <div style={{width:28,height:28,borderRadius:6,background:`linear-gradient(135deg,${AC},${SC})`,
                         display:"grid",placeItems:"center",fontSize:11,fontWeight:700,color:"#fff"}}>PG</div>

          </div>

        {/* ── SIDEBAR ── */}

                     display:"flex",flexDirection:"column",flexShrink:0,overflow:"hidden",
                     transition:"width .25s cubic-bezier(.4,0,.2,1)"}}>

            {/* Chart type selector */}
            <div style={{display:"flex",gap:3}}>
              {[["auto","🤖"],["bar","📊"],["line","📈"],["pie","🥧"],["kpi","🔢"]].map(([t,ico])=>(
                <button key={t} onClick={()=>setChartPref(t)}
                  style={{width:26,height:26,border:"none",borderRadius:6,cursor:"pointer",fontSize:11,
                          background:chartPref===t?AC:T.inputBg,transition:"all .15s"}} title={t}>{ico}</button>
              ))}
            </div>
            <button onClick={()=>setChatOpen(false)}
              style={{background:"none",border:"none",cursor:"pointer",color:T.muted}}>
              <Ico d={I.x} size={16}/>
            </button>
          </div>

          {/* Messages */}
          <div style={{flex:1,overflow:"auto",padding:12,display:"flex",flexDirection:"column",
                       gap:10,background:T.bg}}>
            {chatMsgs.map((msg,i)=>(
              <div key={i} style={{display:"flex",flexDirection:"column",
                                   alignItems:msg.role==="user"?"flex-end":"flex-start"}}>
                <div style={{maxWidth:"92%",padding:"9px 12px",borderRadius:10,wordBreak:"break-word",
                             background:msg.role==="user"?`linear-gradient(135deg,${AC},${SC})`:(msg.error?"rgba(244,63,94,.1)":T.card),
                             color:msg.role==="user"?"#fff":(msg.error?"#F43F5E":T.text),
                             border:msg.role==="ai"?`1px solid ${T.border}`:"none",fontSize:12,lineHeight:1.65,
                             borderBottomRightRadius:msg.role==="user"?2:10,
                             borderBottomLeftRadius:msg.role==="ai"?2:10}}>
                  {msg.text.replace(/\*\*(.*?)\*\*/g,"$1")}
                </div>
                {msg.role==="ai" && msg.chips && i===chatMsgs.length-1 && (
                  <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:8,maxWidth:"92%"}}>
                    {msg.chips.map((c,j)=>(
                      <button key={j} onClick={()=>setChatIn(c)}
                        style={{fontSize:10,padding:"4px 10px",borderRadius:12,border:"none",cursor:"pointer",
                                background:`${AC}15`,color:AC,fontWeight:600,fontFamily:"inherit"}}>
                        {c}
                      </button>
                    ))}
                  </div>
                )}
              </div>
            ))}
            {sending && (
              <div style={{display:"flex",gap:5,padding:"10px 12px",background:T.card,
                           borderRadius:10,border:`1px solid ${T.border}`,width:"fit-content"}}>
                {[0,1,2].map(i=>(
                  <span key={i} className="pulse" style={{width:7,height:7,borderRadius:"50%",
                    background:T.muted,animationDelay:`${i*.2}s`}}/>
                ))}
              </div>
            )}
          </div>

          {/* Input */}
          <div style={{padding:"10px 12px",borderTop:`1px solid ${T.border}`,
                       display:"flex",gap:8,background:T.card,flexShrink:0}}>
            <input value={chatIn} onChange={e=>setChatIn(e.target.value)}
              onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendChat();}}}
              placeholder="Ask about this scorecard…"
              style={{flex:1,background:T.inputBg,border:`1px solid ${T.border}`,borderRadius:8,
                      padding:"8px 12px",fontSize:12,color:T.text,outline:"none",fontFamily:"inherit"}}/>
            <button onClick={sendChat} disabled={sending}
              style={{width:36,height:36,borderRadius:8,border:"none",cursor:"pointer",
                      background:`linear-gradient(135deg,${AC},${SC})`,display:"grid",placeItems:"center",
                      opacity:sending?0.6:1}}>
              <Ico d={I.send} size={14} color="#fff"/>
            </button>
          </div>
        </div>
      )}

      {/* ═══ FAB ═══ */}
      {!chatOpen && (
        <button onClick={()=>{if(chatSC)setChatOpen(true);}}
          style={{position:"fixed",bottom:24,right:24,width:50,height:50,borderRadius:"50%",
                  border:"none",cursor:chatSC?"pointer":"default",
                  background:chatSC?`linear-gradient(135deg,${AC},${SC})`:T.inputBg,
                  display:"grid",placeItems:"center",fontSize:18,
                  boxShadow:chatSC?`0 8px 24px ${AC}40`:"none",zIndex:500,transition:"all .2s"}}>
          🤖
        </button>
      )}
    </div>
  );
}

/* ═══════════════════════════════════════════════
   SCORECARD CARD
═══════════════════════════════════════════════ */
function ScorecardCard({sc,T,AC,theme,onPreview,onChat,index}){
  const [hovered,setHovered] = useState(false);
  const rc = sc.rag==="red"?T.red:sc.rag==="amber"?T.amber:sc.rag==="green"?T.green:T.muted;
  return (
    <div className="card-hover fade-in"
      style={{background:hovered?T.cardHover:T.card,borderRadius:12,
              border:`1px solid ${hovered?rc+"40":T.border}`,
              padding:"16px 18px",display:"flex",flexDirection:"column",gap:12,cursor:"pointer",
              borderLeft:`3px solid ${rc}`,
              boxShadow:hovered?`0 8px 32px rgba(0,0,0,${theme==="dark"?.4:.1})`:`0 2px 12px rgba(0,0,0,${theme==="dark"?.2:.05})`,
              animationDelay:`${index*.05}s`,transition:"all .2s cubic-bezier(.4,0,.2,1)"}}
      onMouseEnter={()=>setHovered(true)} onMouseLeave={()=>setHovered(false)}>

      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
        <div style={{width:40,height:40,borderRadius:10,flexShrink:0,background:`${rc}15`,
                     display:"grid",placeItems:"center",fontSize:18}}>{sc.icon}</div>
        <span style={{fontSize:10,padding:"3px 9px",borderRadius:12,fontWeight:700,
                      background:`${rc}12`,color:rc,border:`1px solid ${rc}30`,
                      display:"flex",alignItems:"center",gap:4}}>
          <span style={{width:5,height:5,borderRadius:"50%",background:rc}}/>
          {sc.rag.toUpperCase()}
        </span>
      </div>

      <div>
        <div style={{fontSize:13,fontWeight:700,lineHeight:1.3,marginBottom:3}}>{sc.name}</div>
        <div style={{fontSize:11,color:T.muted,lineHeight:1.5}}>{sc.desc}</div>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:8,
                   background:hovered?`${rc}08`:T.inputBg,border:`1px solid ${hovered?rc+"30":T.border}`,
                   transition:"all .2s"}}>
        <div>
          <div style={{fontSize:9,color:T.muted,fontWeight:600,textTransform:"uppercase",letterSpacing:.5,marginBottom:2}}>{sc.kri}</div>
          <div style={{fontSize:20,fontWeight:800,color:rc,fontFamily:"'DM Mono',monospace",letterSpacing:"-.5px"}}>{sc.value}</div>
        </div>
        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:4}}>
          <span style={{fontSize:9}}>{sc.trend==="up"?"↑":sc.trend==="down"?"↓":"→"}</span>
          <span style={{fontSize:11,fontWeight:700,fontFamily:"'DM Mono',monospace",
                        color:sc.delta.startsWith("+")?"#10B981":"#F43F5E"}}>{sc.delta}</span>
        </div>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:6,borderTop:`1px solid ${T.border}`,paddingTop:10,marginTop:-2}}>
        <span style={{fontSize:10,fontWeight:700,fontFamily:"'DM Mono',monospace",
                      background:`${AC}15`,color:AC,padding:"2px 8px",borderRadius:4}}>{sc.region}</span>
        <div style={{marginLeft:"auto",display:"flex",gap:6}}>
          <button onClick={e=>{e.stopPropagation();onPreview();}}
            style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",border:"none",
                    borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"inherit",
                    background:"#10B98115",color:"#10B981"}}>
            👁 Preview
          </button>
          <button onClick={e=>{e.stopPropagation();onChat();}}
            style={{display:"flex",alignItems:"center",gap:4,padding:"5px 10px",border:"none",
                    borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"inherit",
                    background:`${AC}15`,color:AC}}>
            🤖 Chat
          </button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════
   CHART CARD WRAPPER
═══════════════════════════════════════════════ */
function ChartCard({title,sub,T,AC,children}){
  return (
    <div className="card-hover"
      style={{background:T.card,border:`1px solid ${T.border}`,borderRadius:12,padding:20,overflow:"hidden",
              boxShadow:`0 4px 24px rgba(0,0,0,.2)`}}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:16}}>
        <div>
          <div style={{fontSize:13,fontWeight:700}}>{title}</div>
          <div style={{fontSize:11,color:T.muted,marginTop:2}}>{sub}</div>
        </div>
      </div>
      {children}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
