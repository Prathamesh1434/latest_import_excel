# metadata/_template.yaml
# Copy → rename to your-scorecard-id.yaml → fill values
# id must match the id field in index.html SCORECARDS array

scorecard_id:  your-id
name:          "Your Scorecard Name"
region:        UK
period:        Feb 2026
overall_rag:   Green

kris:
  - id: KRI-CODE
    name: "KRI description"
    current: 0.85    # decimal — shown as 85%
    previous: 0.80
    red_threshold: 0.70
    rag: Green

scope_instruction: >
  You are an AI assistant ONLY for the [Scorecard Name] (period).
  Answer ONLY questions about this scorecard.
  If asked about anything else say: "I am scoped only to [Scorecard Name]."
