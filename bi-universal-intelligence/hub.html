<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>B&I Controls Hub — Enterprise</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.10.3/Recharts.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.4/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
/* ── Enterprise Light Design System ── */
:root{
  --bg:#F0F2F5; --surface:#FFFFFF; --card:#FFFFFF; --card-hover:#FAFBFC;
  --navy:#003B6F; --blue:#0057A8; --blue-light:#E8F0FA;
  --accent:#0066CC; --accent-hover:#0052A3;
  --red:#C8102E; --amber:#D97706; --green:#047857;
  --red-bg:#FEF2F2; --amber-bg:#FFFBEB; --green-bg:#F0FDF4;
  --red-border:#FECACA; --amber-border:#FDE68A; --green-border:#BBF7D0;
  --text:#111827; --text-2:#374151; --muted:#6B7280; --sub:#9CA3AF;
  --border:#E5E7EB; --border-2:#D1D5DB; --border-accent:#BFDBFE;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow:0 4px 12px rgba(0,0,0,.08),0 2px 6px rgba(0,0,0,.05);
  --shadow-lg:0 12px 32px rgba(0,0,0,.1),0 4px 12px rgba(0,0,0,.06);
  --font:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',monospace;
  --radius:8px; --radius-lg:12px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;font-size:14px;background:var(--bg)}
body{font-family:var(--font);color:var(--text);-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:#F3F4F6}
::-webkit-scrollbar-thumb{background:#D1D5DB;border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#9CA3AF}
.fade{animation:fd .3s ease both}
@keyframes fd{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.card-lift{transition:box-shadow .2s,transform .2s}
.card-lift:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const {
  AreaChart, Area, BarChart, Bar, LineChart, Line,
  PieChart: RPie, Pie, Cell, RadarChart, Radar,
  PolarGrid, PolarAngleAxis, XAxis, YAxis,
  CartesianGrid, Tooltip, Legend, ResponsiveContainer
} = Recharts;

const API = "http://localhost:8000";

/* ── Data ── */
const ENTITIES = [
  { id:"CGML", name:"Citigroup Global Markets Ltd", region:"United Kingdom", color:"#0057A8",
    scorecards:[
      {id:"crmr-cde",  icon:"📊", rag:"amber", name:"CRMR CDE Exceptions",      desc:"CDE Data Quality · UK-K11",         kri:"UK-K11", value:"7 Fail",  delta:"+2",    trend:"up",   region:"UK"},
      {id:"uk-kri",    icon:"🎯", rag:"red",   name:"UK KRI Scorecard",           desc:"UK-K40 · K41 · K42 · K43",          kri:"UK-K41", value:"8%",      delta:"-57.9%",trend:"down", region:"UK"},
      {id:"kri-dash",  icon:"📈", rag:"amber", name:"KRI Dashboard",              desc:"Overall 82.35% · 34 Rules",         kri:"UK-K11", value:"82.35%",  delta:"-1.4%", trend:"down", region:"UK"},
      {id:"dcrm",      icon:"🔍", rag:"na",    name:"DCRM Details",               desc:"CDE Rules by DCRM",                 kri:"DCRM",   value:"9 CDEs",  delta:"—",     trend:"flat", region:"UK"},
      {id:"it-audit",  icon:"🛡️", rag:"na",    name:"IT Audit Controls",          desc:"7 Codified Controls",               kri:"WS2",    value:"7 Active",delta:"—",     trend:"flat", region:"UK"},
    ]
  },
  { id:"CGMSE", name:"Citigroup Global Markets SE", region:"Singapore", color:"#047857",
    scorecards:[
      {id:"sgp-dq", icon:"🌏", rag:"green", name:"SGP DQ Scorecard", desc:"Singapore Data Quality", kri:"SGP-K1", value:"94.2%", delta:"+1.2%", trend:"up", region:"SGP"}
    ]
  },
  { id:"CGME", name:"Citigroup Global Markets Europe", region:"CEP Region", color:"#7C3AED",
    scorecards:[
      {id:"cep", icon:"🏦", rag:"green", name:"CEP Scorecard", desc:"Central Eastern Europe", kri:"CEP-K1", value:"91.8%", delta:"+0.6%", trend:"up", region:"CEP"}
    ]
  },
  { id:"ALL", name:"Cross-Entity", region:"All Regions", color:"#374151",
    scorecards:[
      {id:"bi-vault", icon:"🗄️", rag:"na", name:"BI Vault", desc:"Evidence Store · All Controls", kri:"VAULT", value:"142 Items", delta:"+8", trend:"up", region:"ALL"}
    ]
  }
];

const KRI_TREND = [
  {m:"Mar",k40:88,k41:35,k42:80},{m:"Apr",k40:89,k41:29,k42:81},
  {m:"May",k40:90,k41:22,k42:82},{m:"Jun",k40:91,k41:17,k42:83},
  {m:"Jul",k40:91,k41:14,k42:84},{m:"Aug",k40:92,k41:10,k42:85},
  {m:"Sep",k40:92,k41:8, k42:85},{m:"Oct",k40:93,k41:11,k42:86},
  {m:"Nov",k40:93,k41:14,k42:86},{m:"Dec",k40:94,k41:0, k42:87},
  {m:"Jan",k40:94,k41:19,k42:88},{m:"Feb",k40:95,k41:8, k42:89},
];

const RADAR_DATA = [
  {s:"Completeness",CGML:72,CGMSE:95,CGME:92},
  {s:"Accuracy",    CGML:88,CGMSE:97,CGME:94},
  {s:"Timeliness",  CGML:35,CGMSE:99,CGME:91},
  {s:"Consistency", CGML:81,CGMSE:93,CGME:89},
  {s:"Validity",    CGML:90,CGMSE:96,CGME:93},
];

const STACKED = [
  {m:"Sep",pass:29,amber:4,red:4},{m:"Oct",pass:28,amber:5,red:4},
  {m:"Nov",pass:27,amber:5,red:5},{m:"Dec",pass:27,amber:5,red:5},
  {m:"Jan",pass:26,amber:5,red:6},{m:"Feb",pass:26,amber:4,red:7},
];

/* ── Helpers ── */
const ragColor  = r => r==="red"?"var(--red)":r==="amber"?"var(--amber)":r==="green"?"var(--green)":"var(--muted)";
const ragBg     = r => r==="red"?"var(--red-bg)":r==="amber"?"var(--amber-bg)":r==="green"?"var(--green-bg)":"#F9FAFB";
const ragBorder = r => r==="red"?"var(--red-border)":r==="amber"?"var(--amber-border)":r==="green"?"var(--green-border)":"var(--border)";
const ragLabel  = r => r==="red"?"Red":r==="amber"?"Amber":r==="green"?"Green":"N/A";
const allSC = ENTITIES.flatMap(e => e.scorecards);

/* ── Main App ── */
function App() {
  const [tab,setTab]         = useState("hub");
  const [search,setSearch]   = useState("");
  const [ragF,setRagF]       = useState("all");
  const [coll,setColl]       = useState({});
  const [modal,setModal]     = useState(null);
  const [chatOpen,setChatOpen]= useState(false);
  const [chatSC,setChatSC]   = useState(null);
  const [health,setHealth]   = useState({});

  useEffect(()=>{
    fetch(`${API}/health/`).then(r=>r.json()).then(d=>{
      const h={};(d.services||[]).forEach(s=>h[s.name?.toLowerCase().replace(/\s/g,"")]=s.status);
      setHealth(h);
    }).catch(()=>{});
  },[]);

  const redCnt   = allSC.filter(s=>s.rag==="red").length;
  const amberCnt = allSC.filter(s=>s.rag==="amber").length;
  const greenCnt = allSC.filter(s=>s.rag==="green").length;

  const toggle = id => setColl(p=>({...p,[id]:!p[id]}));

  const openChat = sc => { setChatSC(sc); setChatOpen(true); };

  return (
    <div style={{minHeight:"100vh",background:"var(--bg)",display:"flex",flexDirection:"column"}}>

      {/* ── TOP BAR ── */}
      <header style={{
        height:56,background:"var(--navy)",display:"flex",alignItems:"center",
        padding:"0 24px",gap:16,flexShrink:0,
        boxShadow:"0 2px 8px rgba(0,59,111,.3)"
      }}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:32,height:32,borderRadius:8,background:"rgba(255,255,255,.15)",
                       border:"1px solid rgba(255,255,255,.2)",display:"grid",placeItems:"center",fontSize:14}}>✦</div>
          <div>
            <div style={{fontSize:14,fontWeight:700,color:"#fff",letterSpacing:"-.2px"}}>B&I Controls Hub</div>
            <div style={{fontSize:10,color:"rgba(255,255,255,.55)",letterSpacing:".5px"}}>BANKING &amp; INTERNATIONAL · DATA ANALYTICS</div>
          </div>
          <span style={{fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:3,
                        background:"rgba(255,255,255,.15)",color:"rgba(255,255,255,.8)",
                        letterSpacing:"1px",border:"1px solid rgba(255,255,255,.2)"}}>ENTERPRISE</span>
        </div>

        {/* Search */}
        <div style={{flex:1,maxWidth:360,marginLeft:20}}>
          <div style={{display:"flex",alignItems:"center",gap:8,
                       background:"rgba(255,255,255,.1)",border:"1px solid rgba(255,255,255,.15)",
                       borderRadius:var(--radius),padding:"6px 12px"}}>
            <svg width="13" height="13" fill="none" stroke="rgba(255,255,255,.6)" viewBox="0 0 24 24">
              <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input value={search} onChange={e=>setSearch(e.target.value)}
              placeholder="Search scorecards, controls, KRIs…"
              style={{background:"none",border:"none",outline:"none",color:"#fff",fontSize:13,
                      flex:1,fontFamily:"inherit","::placeholder":{color:"rgba(255,255,255,.4)"}}}/>
          </div>
        </div>

        <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
          {/* Health */}
          <div style={{display:"flex",gap:6,padding:"5px 10px",
                       background:"rgba(255,255,255,.08)",borderRadius:var(--radius),
                       border:"1px solid rgba(255,255,255,.12)"}}>
            {[["tableau","T"],["vertexai","AI"],["oracle","DB"]].map(([k,l])=>(
              <span key={k} style={{display:"flex",alignItems:"center",gap:3,fontSize:9,
                                    color:"rgba(255,255,255,.7)",fontFamily:"var(--mono)"}}>
                <span style={{width:6,height:6,borderRadius:"50%",background:
                  health[k]==="ok"?"#10B981":health[k]==="down"?"#EF4444":"#6B7280"}}/>
                {l}
              </span>
            ))}
          </div>

          {/* User */}
          <div style={{display:"flex",alignItems:"center",gap:8,padding:"4px 12px 4px 4px",
                       background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.12)",
                       borderRadius:var(--radius)}}>
            <div style={{width:28,height:28,borderRadius:6,background:"rgba(255,255,255,.2)",
                         display:"grid",placeItems:"center",fontSize:11,fontWeight:700,color:"#fff"}}>PG</div>
            <span style={{fontSize:12,fontWeight:500,color:"rgba(255,255,255,.9)"}}>PG23137</span>
          </div>
        </div>
      </header>

      <div style={{display:"flex",flex:1,overflow:"hidden"}}>

        {/* ── SIDEBAR ── */}
        <aside style={{width:220,background:"var(--surface)",borderRight:"1px solid var(--border)",
                       display:"flex",flexDirection:"column",flexShrink:0,overflow:"auto"}}>
          <div style={{padding:"12px 8px",display:"flex",flexDirection:"column",gap:1}}>
            {[{id:"hub",label:"Scorecards",icon:"⊞"},
              {id:"analytics",label:"Analytics",icon:"📊"},
              {id:"history",label:"Chat History",icon:"💬"}].map(item=>(
              <button key={item.id} onClick={()=>setTab(item.id)} style={{
                display:"flex",alignItems:"center",gap:10,padding:"9px 12px",
                borderRadius:var(--radius),border:"none",cursor:"pointer",fontSize:13,
                textAlign:"left",width:"100%",fontFamily:"inherit",transition:"all .15s",
                background:tab===item.id?"var(--blue-light)":"transparent",
                color:tab===item.id?"var(--accent)":"var(--text-2)",
                fontWeight:tab===item.id?600:400,
              }}>
                <span style={{fontSize:14}}>{item.icon}</span>
                {item.label}
              </button>
            ))}

            <div style={{height:1,background:"var(--border)",margin:"12px 4px"}}/>
            <div style={{padding:"2px 12px 6px",fontSize:10,fontWeight:600,
                         color:"var(--muted)",letterSpacing:"1px",textTransform:"uppercase"}}>Legal Entities</div>

            {ENTITIES.map(e=>(
              <button key={e.id} onClick={()=>setTab("hub")} style={{
                display:"flex",alignItems:"center",gap:8,padding:"7px 12px",
                borderRadius:var(--radius),border:"none",cursor:"pointer",background:"transparent",
                color:"var(--text-2)",fontSize:12,textAlign:"left",width:"100%",fontFamily:"inherit",
              }}>
                <span style={{width:8,height:8,borderRadius:"50%",background:e.color,flexShrink:0}}/>
                <span style={{flex:1,fontWeight:500}}>{e.id}</span>
                <span style={{fontSize:10,padding:"1px 6px",borderRadius:4,
                              background:e.color+"18",color:e.color,fontWeight:600}}>
                  {e.scorecards.length}
                </span>
              </button>
            ))}

            <div style={{height:1,background:"var(--border)",margin:"12px 4px"}}/>
            <a href="connect.html" style={{
              display:"flex",alignItems:"center",gap:8,padding:"9px 12px",
              borderRadius:var(--radius),textDecoration:"none",fontSize:13,fontWeight:600,
              color:"var(--accent)",background:"var(--blue-light)",border:"1px solid var(--border-accent)",
            }}>
              🔌 Connect Dashboard
            </a>
          </div>

          <div style={{marginTop:"auto",padding:"14px 16px",borderTop:"1px solid var(--border)"}}>
            <div style={{fontSize:11,color:"var(--muted)",lineHeight:1.8}}>
              <div style={{fontWeight:600,color:"var(--text-2)",marginBottom:2}}>Workstream 2</div>
              Controls Codification<br/>
              <span style={{color:"var(--accent)",fontSize:10,fontFamily:"var(--mono)"}}>v4.0 · April 2026</span>
            </div>
          </div>
        </aside>

        {/* ── MAIN CONTENT ── */}
        <main style={{flex:1,overflow:"auto",background:"var(--bg)"}}>

          {/* Tab nav */}
          <div style={{background:"var(--surface)",borderBottom:"1px solid var(--border)",
                       display:"flex",padding:"0 24px",gap:0}}>
            {[{id:"hub",label:"Scorecards"},{id:"analytics",label:"Analytics"},{id:"history",label:"Chat History"}].map(t=>(
              <button key={t.id} onClick={()=>setTab(t.id)} style={{
                padding:"14px 20px",border:"none",background:"none",cursor:"pointer",
                fontSize:13,fontWeight:tab===t.id?600:400,fontFamily:"inherit",
                color:tab===t.id?"var(--accent)":"var(--muted)",
                borderBottom:tab===t.id?"2px solid var(--accent)":"2px solid transparent",
                marginBottom:-1,transition:"all .15s",
              }}>{t.label}</button>
            ))}
          </div>

          <div style={{padding:24}}>

            {/* ═══ SCORECARDS ═══ */}
            {tab==="hub" && <div className="fade">

              {/* Page header */}
              <div style={{marginBottom:20}}>
                <div style={{fontSize:11,color:"var(--muted)",marginBottom:6,display:"flex",gap:6}}>
                  <span>Home</span><span>›</span><span style={{color:"var(--navy)",fontWeight:500}}>Data Control</span>
                </div>
                <h1 style={{fontSize:22,fontWeight:700,color:"var(--navy)",letterSpacing:"-.3px"}}>
                  Data Control Scorecards
                </h1>
                <p style={{fontSize:13,color:"var(--muted)",marginTop:4}}>
                  Grouped by legal entity · As of April 2026 · Click Preview or Chat to inspect
                </p>
              </div>

              {/* KPI summary tiles */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
                {[
                  {l:"Total Scorecards",v:"8",  c:"var(--navy)", border:"var(--border)"},
                  {l:"RAG Red",         v:String(redCnt),  c:"var(--red)",   border:"var(--red-border)"},
                  {l:"RAG Amber",       v:String(amberCnt),c:"var(--amber)", border:"var(--amber-border)"},
                  {l:"RAG Green",       v:String(greenCnt),c:"var(--green)", border:"var(--green-border)"},
                ].map(k=>(
                  <div key={k.l} className="card-lift" style={{
                    background:"var(--surface)",borderRadius:var(--radius-lg),
                    border:`1px solid ${k.border}`,padding:"16px 20px",
                    boxShadow:"var(--shadow-sm)",borderTop:`3px solid ${k.c}`,
                  }}>
                    <div style={{fontSize:10,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".8px",marginBottom:8}}>{k.l}</div>
                    <div style={{fontSize:32,fontWeight:800,color:k.c,letterSpacing:"-1px",lineHeight:1}}>{k.v}</div>
                  </div>
                ))}
              </div>

              {/* Filters */}
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20,flexWrap:"wrap"}}>
                <span style={{fontSize:11,color:"var(--muted)",fontWeight:500}}>Filter:</span>
                {["all","red","amber","green"].map(f=>(
                  <button key={f} onClick={()=>setRagF(f)} style={{
                    padding:"5px 14px",borderRadius:20,cursor:"pointer",
                    fontSize:12,fontWeight:600,fontFamily:"inherit",transition:"all .2s",border:"1px solid",
                    background:ragF===f?(f==="all"?"var(--navy)":ragBg(f)):"var(--surface)",
                    color:ragF===f?(f==="all"?"#fff":ragColor(f)):"var(--muted)",
                    borderColor:ragF===f?(f==="all"?"var(--navy)":ragBorder(f)):"var(--border)",
                  }}>
                    {f==="all"?"All Entities":f.charAt(0).toUpperCase()+f.slice(1)}
                  </button>
                ))}
                <a href="connect.html" style={{
                  marginLeft:"auto",display:"inline-flex",alignItems:"center",gap:6,
                  padding:"6px 14px",borderRadius:var(--radius),background:"var(--navy)",
                  color:"#fff",fontSize:12,fontWeight:600,textDecoration:"none",
                  boxShadow:"0 2px 6px rgba(0,59,111,.25)",
                }}>🔌 Connect New Dashboard</a>
              </div>

              {/* Entities */}
              {ENTITIES.map(entity=>{
                const visible = entity.scorecards.filter(sc=>{
                  const q=search.toLowerCase();
                  return (!q||sc.name.toLowerCase().includes(q)||sc.id.includes(q))
                      && (ragF==="all"||sc.rag===ragF);
                });
                if(!visible.length&&(search||ragF!=="all")) return null;
                return (
                  <div key={entity.id} style={{marginBottom:24}}>
                    {/* Entity header */}
                    <div onClick={()=>toggle(entity.id)} style={{
                      display:"flex",alignItems:"center",gap:12,padding:"12px 16px",
                      background:"var(--surface)",borderRadius:var(--radius-lg),
                      border:"1px solid var(--border)",boxShadow:"var(--shadow-sm)",
                      cursor:"pointer",marginBottom:12,transition:"box-shadow .2s",
                    }}>
                      <div style={{width:36,height:36,borderRadius:8,flexShrink:0,
                                   background:entity.color+"15",border:`1px solid ${entity.color}30`,
                                   display:"grid",placeItems:"center",fontSize:16}}>
                        {entity.id==="CGML"?"🏛️":entity.id==="CGMSE"?"🌏":entity.id==="CGME"?"🏦":"🗄️"}
                      </div>
                      <div style={{flex:1}}>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <span style={{fontSize:13,fontWeight:700,color:entity.color,fontFamily:"var(--mono)"}}>
                            {entity.id}
                          </span>
                          <span style={{fontSize:12,color:"var(--text-2)",fontWeight:500}}>{entity.name}</span>
                          <span style={{fontSize:10,padding:"2px 8px",borderRadius:3,
                                        background:entity.color+"15",color:entity.color,
                                        fontWeight:600,border:`1px solid ${entity.color}25`}}>
                            {entity.region}
                          </span>
                        </div>
                      </div>
                      <span style={{fontSize:11,color:"var(--muted)"}}>
                        {visible.length} scorecard{visible.length!==1?"s":""}
                      </span>
                      <span style={{fontSize:16,color:"var(--muted)",transform:coll[entity.id]?"rotate(-90deg)":"none",transition:"transform .2s"}}>›</span>
                    </div>

                    {!coll[entity.id] && (
                      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(310px,1fr))",gap:12}}>
                        {visible.map((sc,i)=>(
                          <ScoreCard key={sc.id} sc={sc} idx={i}
                            onPreview={()=>setModal(sc)} onChat={()=>openChat(sc)}/>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>}

            {/* ═══ ANALYTICS ═══ */}
            {tab==="analytics" && <div className="fade">
              <div style={{marginBottom:20}}>
                <h1 style={{fontSize:22,fontWeight:700,color:"var(--navy)",letterSpacing:"-.3px"}}>Analytics</h1>
                <p style={{fontSize:13,color:"var(--muted)",marginTop:4}}>KRI performance &amp; AI usage — last 12 months</p>
              </div>

              {/* Stats */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
                {[{l:"Sessions",v:"47",d:"+12%",up:true},{l:"AI Messages",v:"213",d:"+24%",up:true},
                  {l:"Avg Response",v:"1.2s",d:"-18%",up:false},{l:"Active Users",v:"6",d:"+2",up:true}].map(s=>(
                  <div key={s.l} className="card-lift" style={{
                    background:"var(--surface)",border:"1px solid var(--border)",
                    borderRadius:var(--radius-lg),padding:"16px 20px",boxShadow:"var(--shadow-sm)"
                  }}>
                    <div style={{fontSize:10,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",letterSpacing:".8px",marginBottom:8}}>{s.l}</div>
                    <div style={{fontSize:28,fontWeight:800,color:"var(--navy)",letterSpacing:"-1px"}}>{s.v}</div>
                    <div style={{fontSize:11,color:s.up?"var(--green)":"var(--red)",marginTop:6,fontWeight:500}}>
                      {s.d} this month
                    </div>
                  </div>
                ))}
              </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:16}}>
                <ChartBox title="UK KRI 12-Month Trend" sub="UK-K40 · K41 · K42 (%) vs targets">
                  <ResponsiveContainer width="100%" height={200}>
                    <AreaChart data={KRI_TREND} margin={{top:10,right:10,left:-20,bottom:0}}>
                      <defs>
                        <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="5%" stopColor="#0057A8" stopOpacity={.15}/>
                          <stop offset="95%" stopColor="#0057A8" stopOpacity={0}/>
                        </linearGradient>
                        <linearGradient id="g2" x1="0" y1="0" x2="0" y2="1">
                          <stop offset="5%" stopColor="#C8102E" stopOpacity={.12}/>
                          <stop offset="95%" stopColor="#C8102E" stopOpacity={0}/>
                        </linearGradient>
                      </defs>
                      <CartesianGrid strokeDasharray="3 3" stroke="#F3F4F6" vertical={false}/>
                      <XAxis dataKey="m" tick={{fill:"#9CA3AF",fontSize:10}} axisLine={false} tickLine={false}/>
                      <YAxis tick={{fill:"#9CA3AF",fontSize:10}} axisLine={false} tickLine={false}/>
                      <Tooltip contentStyle={{background:"#fff",border:"1px solid #E5E7EB",borderRadius:8,fontSize:12,boxShadow:"0 4px 12px rgba(0,0,0,.08)"}}/>
                      <Legend iconType="circle" iconSize={7} wrapperStyle={{fontSize:11}}/>
                      <Area type="monotone" dataKey="k40" name="UK-K40" stroke="#0057A8" fill="url(#g1)" strokeWidth={2} dot={false}/>
                      <Area type="monotone" dataKey="k41" name="UK-K41" stroke="#C8102E" fill="url(#g2)" strokeWidth={2} dot={false}/>
                      <Line type="monotone" dataKey="k42" name="UK-K42" stroke="#D97706" strokeWidth={2} dot={false}/>
                    </AreaChart>
                  </ResponsiveContainer>
                </ChartBox>

                <ChartBox title="Data Quality Radar" sub="CGML · CGMSE · CGME vs benchmarks">
                  <ResponsiveContainer width="100%" height={200}>
                    <RadarChart data={RADAR_DATA}>
                      <PolarGrid stroke="#F3F4F6"/>
                      <PolarAngleAxis dataKey="s" tick={{fill:"#6B7280",fontSize:10}}/>
                      <Radar name="CGML"  dataKey="CGML"  stroke="#C8102E" fill="#C8102E" fillOpacity={.08} strokeWidth={2}/>
                      <Radar name="CGMSE" dataKey="CGMSE" stroke="#047857" fill="#047857" fillOpacity={.08} strokeWidth={2}/>
                      <Radar name="CGME"  dataKey="CGME"  stroke="#7C3AED" fill="#7C3AED" fillOpacity={.08} strokeWidth={2}/>
                      <Legend iconType="circle" iconSize={7} wrapperStyle={{fontSize:11}}/>
                      <Tooltip contentStyle={{background:"#fff",border:"1px solid #E5E7EB",borderRadius:8,fontSize:12}}/>
                    </RadarChart>
                  </ResponsiveContainer>
                </ChartBox>
              </div>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                <ChartBox title="CDE Rule Status Trend" sub="Pass · Amber · Red (6 months)">
                  <ResponsiveContainer width="100%" height={180}>
                    <BarChart data={STACKED} margin={{top:10,right:10,left:-20,bottom:0}}>
                      <CartesianGrid strokeDasharray="3 3" stroke="#F3F4F6" vertical={false}/>
                      <XAxis dataKey="m" tick={{fill:"#9CA3AF",fontSize:10}} axisLine={false} tickLine={false}/>
                      <YAxis tick={{fill:"#9CA3AF",fontSize:10}} axisLine={false} tickLine={false}/>
                      <Tooltip contentStyle={{background:"#fff",border:"1px solid #E5E7EB",borderRadius:8,fontSize:12}}/>
                      <Legend iconType="circle" iconSize={7} wrapperStyle={{fontSize:11}}/>
                      <Bar dataKey="pass"  name="Pass"  stackId="a" fill="#D1FAE5" stroke="#047857" strokeWidth={.5}/>
                      <Bar dataKey="amber" name="Amber" stackId="a" fill="#FEF3C7" stroke="#D97706" strokeWidth={.5}/>
                      <Bar dataKey="red"   name="Red"   stackId="a" fill="#FEE2E2" stroke="#C8102E" strokeWidth={.5} radius={[4,4,0,0]}/>
                    </BarChart>
                  </ResponsiveContainer>
                </ChartBox>

                <ChartBox title="Entity Coverage" sub="Controls coverage by legal entity">
                  <div style={{padding:"16px 0"}}>
                    {ENTITIES.map(e=>(
                      <div key={e.id} style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
                        <span style={{width:64,fontSize:11,fontWeight:700,color:e.color,fontFamily:"var(--mono)"}}>{e.id}</span>
                        <div style={{flex:1,height:8,background:"#F3F4F6",borderRadius:4,overflow:"hidden"}}>
                          <div style={{height:"100%",borderRadius:4,background:e.color,
                                       width:`${Math.min(100,e.scorecards.length/8*100)}%`,transition:"width .6s"}}/>
                        </div>
                        <span style={{fontSize:11,fontWeight:600,color:"var(--text-2)",width:20,textAlign:"right"}}>
                          {e.scorecards.length}
                        </span>
                      </div>
                    ))}
                  </div>
                </ChartBox>
              </div>
            </div>}

            {/* ═══ HISTORY ═══ */}
            {tab==="history" && <div className="fade">
              <div style={{marginBottom:20}}>
                <h1 style={{fontSize:22,fontWeight:700,color:"var(--navy)",letterSpacing:"-.3px"}}>Chat History</h1>
                <p style={{fontSize:13,color:"var(--muted)",marginTop:4}}>Recent AI conversations stored in Oracle DB</p>
              </div>
              {[
                {sc:"UK KRI Scorecard",time:"Today 15:32",msgs:8,rag:"red",entity:"CGML",sid:"a3f8b12c"},
                {sc:"CRMR CDE Exceptions",time:"Today 11:14",msgs:5,rag:"amber",entity:"CGML",sid:"7d2e904a"},
                {sc:"KRI Dashboard",time:"Yesterday 16:45",msgs:12,rag:"amber",entity:"CGML",sid:"c91f3b77"},
                {sc:"SGP DQ Scorecard",time:"27 Mar 2026",msgs:3,rag:"green",entity:"CGMSE",sid:"552da011"},
              ].map((s,i)=>(
                <div key={i} className="card-lift" style={{
                  background:"var(--surface)",border:"1px solid var(--border)",
                  borderRadius:var(--radius-lg),padding:"14px 18px",marginBottom:10,
                  boxShadow:"var(--shadow-sm)",display:"flex",alignItems:"center",gap:14,cursor:"pointer",
                }}>
                  <div style={{width:38,height:38,borderRadius:8,flexShrink:0,
                               background:"var(--blue-light)",display:"grid",placeItems:"center",fontSize:16}}>💬</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,fontWeight:600,color:"var(--navy)"}}>{s.sc}</div>
                    <div style={{fontSize:11,color:"var(--muted)",marginTop:2,fontFamily:"var(--mono)"}}>
                      {s.time} · Session {s.sid}… · {s.entity}
                    </div>
                  </div>
                  <span style={{fontSize:10,padding:"3px 10px",borderRadius:20,fontWeight:600,
                                background:ragBg(s.rag),color:ragColor(s.rag),border:`1px solid ${ragBorder(s.rag)}`}}>
                    {ragLabel(s.rag)}
                  </span>
                  <span style={{fontSize:11,fontWeight:600,padding:"4px 12px",borderRadius:20,
                                background:"var(--blue-light)",color:"var(--accent)",fontFamily:"var(--mono)"}}>
                    {s.msgs} msgs
                  </span>
                  <span style={{color:"var(--muted)",fontSize:16}}>›</span>
                </div>
              ))}
            </div>}

          </div>{/* /padding */}
        </main>
      </div>{/* /flex */}

      {/* ── MODAL ── */}
      {modal && (
        <div onClick={e=>{if(e.target===e.currentTarget)setModal(null)}} style={{
          position:"fixed",inset:0,zIndex:1000,background:"rgba(0,0,0,.45)",
          backdropFilter:"blur(4px)",display:"flex",alignItems:"center",justifyContent:"center",padding:20,
        }}>
          <div className="fade" style={{
            width:"100%",maxWidth:780,background:"var(--surface)",borderRadius:var(--radius-lg),
            boxShadow:"var(--shadow-lg)",border:"1px solid var(--border)",overflow:"hidden",
          }}>
            <div style={{padding:"18px 24px",borderBottom:"1px solid var(--border)",
                         background:"var(--bg)",display:"flex",alignItems:"center",gap:14}}>
              <span style={{fontSize:24}}>{modal.icon}</span>
              <div style={{flex:1}}>
                <h2 style={{margin:0,fontSize:16,fontWeight:700,color:"var(--navy)"}}>{modal.name}</h2>
                <div style={{fontSize:12,color:"var(--muted)",marginTop:2}}>{modal.desc}</div>
              </div>
              <span style={{fontSize:11,padding:"4px 12px",borderRadius:20,fontWeight:600,
                            background:ragBg(modal.rag),color:ragColor(modal.rag),
                            border:`1px solid ${ragBorder(modal.rag)}`}}>
                {ragLabel(modal.rag)}
              </span>
              <button onClick={()=>setModal(null)} style={{
                width:32,height:32,borderRadius:var(--radius),border:"1px solid var(--border)",
                background:"var(--surface)",cursor:"pointer",fontSize:16,color:"var(--muted)",
                display:"grid",placeItems:"center"
              }}>×</button>
            </div>
            <div style={{padding:24}}>
              <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
                {[{l:"Current Value",v:modal.value,c:"var(--navy)"},
                  {l:"Delta",v:modal.delta,c:ragColor(modal.rag)},
                  {l:"KRI Reference",v:modal.kri,c:"var(--text-2)"},
                  {l:"Region",v:modal.region,c:"var(--text-2)"}].map(k=>(
                  <div key={k.l} style={{background:"var(--bg)",borderRadius:var(--radius),
                                         padding:"14px 16px",border:"1px solid var(--border)"}}>
                    <div style={{fontSize:9,fontWeight:600,color:"var(--muted)",textTransform:"uppercase",
                                 letterSpacing:".8px",marginBottom:6}}>{k.l}</div>
                    <div style={{fontSize:20,fontWeight:800,color:k.c,fontFamily:"var(--mono)"}}>{k.v}</div>
                  </div>
                ))}
              </div>
              <div style={{background:"var(--bg)",borderRadius:var(--radius),
                           border:"1px dashed var(--border-2)",padding:32,textAlign:"center",marginBottom:16}}>
                <div style={{fontSize:32,marginBottom:8}}>📊</div>
                <div style={{fontSize:13,fontWeight:600,color:"var(--text-2)",marginBottom:4}}>Tableau Snapshot</div>
                <div style={{fontSize:12,color:"var(--muted)"}}>
                  Fetched via <code style={{fontFamily:"var(--mono)",color:"var(--accent)"}}>GET /snapshot/{modal.id}</code>
                </div>
                <div style={{marginTop:14,display:"flex",gap:8,justifyContent:"center"}}>
                  {[["↻ Refresh","var(--surface)","var(--text-2)"],["⬇ PDF","var(--surface)","var(--text-2)"]].map(([l,bg,c])=>(
                    <button key={l} style={{padding:"7px 16px",borderRadius:var(--radius),border:"1px solid var(--border)",
                                           background:bg,color:c,fontSize:12,fontWeight:500,cursor:"pointer",fontFamily:"inherit"}}>{l}</button>
                  ))}
                  <button onClick={()=>{setModal(null);openChat(modal);}} style={{
                    padding:"7px 16px",borderRadius:var(--radius),border:"none",
                    background:"var(--navy)",color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit",
                  }}>🤖 Chat about this</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── CHAT PANEL ── */}
      {chatOpen && (
        <div style={{
          position:"fixed",bottom:0,right:24,zIndex:900,width:380,height:560,
          background:"var(--surface)",border:"1px solid var(--border)",borderBottom:"none",
          borderRadius:"12px 12px 0 0",display:"flex",flexDirection:"column",overflow:"hidden",
          boxShadow:"-4px -4px 20px rgba(0,0,0,.1)",
          animation:"fd .25s ease",
        }}>
          <div style={{padding:"11px 14px",background:"var(--navy)",
                       display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
            <div style={{width:28,height:28,borderRadius:7,background:"rgba(255,255,255,.15)",
                         display:"grid",placeItems:"center",fontSize:14}}>🤖</div>
            <div style={{flex:1}}>
              <div style={{fontSize:12,fontWeight:700,color:"#fff"}}>B&I Controls AI</div>
              <div style={{fontSize:10,color:"rgba(255,255,255,.6)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:220}}>
                {chatSC?.name}
              </div>
            </div>
            <button onClick={()=>setChatOpen(false)} style={{
              background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,.7)",fontSize:18,
            }}>×</button>
          </div>
          <div style={{flex:1,padding:12,background:"var(--bg)",
                       display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",
                       color:"var(--muted)",textAlign:"center",fontSize:12,gap:8}}>
            <div style={{fontSize:32}}>🤖</div>
            <div style={{fontWeight:600,color:"var(--text-2)"}}>Open in full chatbot</div>
            <div>For the full AI experience with chart rendering and PANDAS / AI modes</div>
            <button onClick={()=>{
              window.open(`chatbot.html?id=${chatSC?.id}&name=${encodeURIComponent(chatSC?.name||"")}`,
                "_blank","width=440,height=640");
              setChatOpen(false);
            }} style={{
              marginTop:8,padding:"9px 20px",background:"var(--navy)",color:"#fff",
              border:"none",borderRadius:var(--radius),cursor:"pointer",fontSize:13,fontWeight:600,fontFamily:"inherit",
            }}>Open AI Chat →</button>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── Scorecard Card ── */
function ScoreCard({sc,idx,onPreview,onChat}){
  const rc = ragColor(sc.rag);
  return (
    <div className="card-lift fade" style={{
      background:"var(--surface)",borderRadius:var(--radius-lg),
      border:"1px solid var(--border)",padding:"16px 18px",
      boxShadow:"var(--shadow-sm)",display:"flex",flexDirection:"column",gap:12,
      cursor:"pointer",borderLeft:`4px solid ${rc}`,
      animationDelay:`${idx*.04}s`,
    }}>
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:8}}>
        <div style={{width:38,height:38,borderRadius:8,flexShrink:0,
                     background:ragBg(sc.rag),border:`1px solid ${ragBorder(sc.rag)}`,
                     display:"grid",placeItems:"center",fontSize:18}}>{sc.icon}</div>
        <span style={{fontSize:10,padding:"3px 10px",borderRadius:20,fontWeight:600,
                      background:ragBg(sc.rag),color:rc,border:`1px solid ${ragBorder(sc.rag)}`}}>
          {ragLabel(sc.rag)}
        </span>
      </div>

      <div>
        <div style={{fontSize:13,fontWeight:700,color:"var(--navy)",lineHeight:1.3,marginBottom:2}}>{sc.name}</div>
        <div style={{fontSize:11,color:"var(--muted)",lineHeight:1.5}}>{sc.desc}</div>
      </div>

      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px",borderRadius:var(--radius),
                   background:"var(--bg)",border:"1px solid var(--border)"}}>
        <div>
          <div style={{fontSize:9,color:"var(--muted)",fontWeight:600,textTransform:"uppercase",
                       letterSpacing:".5px",marginBottom:2}}>{sc.kri}</div>
          <div style={{fontSize:18,fontWeight:800,color:rc,fontFamily:"var(--mono)"}}>{sc.value}</div>
        </div>
        <div style={{marginLeft:"auto",fontSize:11,fontWeight:600,
                     color:sc.delta.startsWith("+")&&sc.rag!=="red"?"var(--green)":
                           sc.delta.startsWith("-")?"var(--red)":"var(--muted)"}}>
          {sc.delta}
        </div>
      </div>

      <div style={{display:"flex",gap:6,borderTop:"1px solid var(--border)",paddingTop:10}}>
        <span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:4,
                      background:"var(--blue-light)",color:"var(--accent)",fontFamily:"var(--mono)"}}>{sc.region}</span>
        <div style={{marginLeft:"auto",display:"flex",gap:6}}>
          <button onClick={e=>{e.stopPropagation();onPreview();}} style={{
            display:"flex",alignItems:"center",gap:4,padding:"5px 10px",border:"1px solid var(--border)",
            borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"inherit",
            background:"var(--surface)",color:"var(--text-2)",
          }}>👁 Preview</button>
          <button onClick={e=>{e.stopPropagation();onChat();}} style={{
            display:"flex",alignItems:"center",gap:4,padding:"5px 10px",border:"none",
            borderRadius:6,cursor:"pointer",fontSize:11,fontWeight:600,fontFamily:"inherit",
            background:"var(--navy)",color:"#fff",
          }}>🤖 Chat</button>
        </div>
      </div>
    </div>
  );
}

/* ── Chart Box ── */
function ChartBox({title,sub,children}){
  return (
    <div className="card-lift" style={{
      background:"var(--surface)",border:"1px solid var(--border)",
      borderRadius:var(--radius-lg),overflow:"hidden",boxShadow:"var(--shadow-sm)"
    }}>
      <div style={{padding:"14px 16px 10px",borderBottom:"1px solid var(--border)"}}>
        <div style={{fontSize:13,fontWeight:700,color:"var(--navy)"}}>{title}</div>
        <div style={{fontSize:11,color:"var(--muted)",marginTop:2}}>{sub}</div>
      </div>
      <div style={{padding:"12px 16px 16px"}}>{children}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
